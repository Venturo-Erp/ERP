<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        font-size: 13px;
        line-height: 1.6;
        color: #333;
        padding: 20px;
      }
      h1 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 16px;
        color: #1a1a1a;
      }
      .success {
        color: #34c759;
        font-size: 16px;
        margin-bottom: 20px;
      }
      h2 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #1a1a1a;
      }
      .command-box {
        background: #1e1e1e;
        color: #d4d4d4;
        border-radius: 8px;
        padding: 14px 18px;
        font-family: 'SF Mono', Menlo, monospace;
        font-size: 13px;
        margin-bottom: 20px;
        line-height: 1.8;
      }
      .command-box .prompt {
        color: #888;
      }
      .command-box .cmd {
        color: #7ec8e3;
      }
      .command-box .comment {
        color: #6a9955;
      }
      .note {
        background: #f5f5f7;
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 12px;
        color: #666;
        margin-bottom: 16px;
      }
      .footer {
        margin-top: 20px;
        font-size: 11px;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <h1>安裝完成！</h1>
    <p class="success">所有元件已成功安裝到您的 Mac。</p>

    <h2>快速開始</h2>
    <p>請開啟「終端機」應用程式，輸入以下指令：</p>

    <div class="command-box">
      <span class="comment"># 啟動 OpenClaw</span><br />
      <span class="prompt">$</span> <span class="cmd">openclaw</span><br />
      <br />
      <span class="comment"># 查看所有指令</span><br />
      <span class="prompt">$</span> <span class="cmd">openclaw --help</span>
    </div>

    <div class="note">
      <strong>提示：</strong>如果終端機顯示「找不到指令」，請關閉並重新開啟終端機視窗。
    </div>

    <div class="note">
      <strong>登入：</strong>如果瀏覽器登入頁面沒有自動開啟，請前往 claude.ai 登入您的訂閱帳號。
    </div>

    <p class="footer">
      安裝記錄：/tmp/openclaw-install.log<br />
      Venturo Team
    </p>
  </body>
</html>
