<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        font-size: 13px;
        line-height: 1.6;
        color: #333;
        padding: 20px;
      }
      h1 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 4px;
        color: #1a1a1a;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 20px;
      }
      .description {
        margin-bottom: 20px;
        color: #555;
      }
      h2 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #1a1a1a;
      }
      ul {
        padding-left: 20px;
        margin: 0 0 20px 0;
      }
      li {
        margin-bottom: 6px;
      }
      .item-name {
        font-weight: 500;
      }
      .item-desc {
        color: #888;
        font-size: 12px;
      }
      .note {
        background: #f5f5f7;
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>OpenClaw Installer</h1>
    <p class="subtitle">Version 1.0 &middot; Venturo Team</p>

    <p class="description">
      此安裝程式將在您的 Mac 上安裝 OpenClaw 及所有必要的開發工具。 安裝過程大約需要 5-10
      分鐘（視網路速度而定）。
    </p>

    <h2>安裝項目</h2>
    <ul>
      <li>
        <span class="item-name">Homebrew</span>
        <span class="item-desc">&mdash; macOS 套件管理器</span>
      </li>
      <li>
        <span class="item-name">Node.js 22</span>
        <span class="item-desc">&mdash; JavaScript 執行環境</span>
      </li>
      <li>
        <span class="item-name">pnpm</span>
        <span class="item-desc">&mdash; 快速套件管理器</span>
      </li>
      <li>
        <span class="item-name">OpenClaw</span>
        <span class="item-desc">&mdash; AI Agent 框架</span>
      </li>
    </ul>

    <div class="note">
      <strong>注意：</strong>安裝過程中需要網路連線。已安裝的項目會自動跳過。
      安裝結束時會開啟瀏覽器，請用您的 Claude 訂閱帳號登入完成驗證。
    </div>
  </body>
</html>
