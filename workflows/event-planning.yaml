# 活動企劃工作流範本
# 預計時間：3-5 天
# 適用：線上/線下活動、行銷活動

name: 活動企劃
code: event-planning
duration_days: 3-5
priority: P1
category: 行銷活動

# 工作流步驟
steps:
  - id: briefing
    name: 活動目標確認
    description: 確認活動目標、受眾、預算
    assignees:
      - ben # 業務經理
      - caesar # 產品經理
    duration_days: 0.5
    outputs:
      - 活動 Brief 文件
      - 目標受眾定義
      - 預算範圍
    next_step: ideation

  - id: ideation
    name: 創意發想
    description: 團隊腦力激盪，提出活動創意
    assignees:
      - ben # 業務經理
      - caesar # 產品經理
      - designer # 設計師
    duration_days: 1
    outputs:
      - 3-5 個活動創意方案
      - 初步評估（可行性、成本、效果）
    dependencies:
      - briefing
    next_step: proposal

  - id: proposal
    name: 活動企劃書
    description: 撰寫完整的活動企劃書
    assignees:
      - ben # 業務經理
    duration_days: 1
    outputs:
      - 活動企劃書（PPT/Word）
      - 時程表
      - 預算明細
      - KPI 設定
    dependencies:
      - ideation
    next_step: approval

  - id: approval
    name: 企劃審批
    description: William 審批企劃書
    assignees:
      - william # 決策者
    duration_days: 0.5
    outputs:
      - 審批意見
      - 預算核准
    dependencies:
      - proposal
    next_step: preparation

  - id: preparation
    name: 活動準備
    description: 執行活動所需的準備工作
    assignees:
      - ben # 業務經理
      - designer # 設計師
      - matthew # 技術支援（如需線上系統）
    duration_days: 2
    outputs:
      - 宣傳素材（海報、文案、影片）
      - 報名系統（如需要）
      - 場地/設備確認
      - 合作夥伴確認
    dependencies:
      - approval
    next_step: execution

  - id: execution
    name: 活動執行
    description: 實際執行活動
    assignees:
      - ben # 主責
      - team # 全員支援
    duration_days: 1
    outputs:
      - 活動順利完成
      - 參與人數記錄
      - 現場照片/影片
    dependencies:
      - preparation
    next_step: review

  - id: review
    name: 活動檢討
    description: 檢討活動成效，撰寫報告
    assignees:
      - ben # 業務經理
    duration_days: 1
    outputs:
      - 活動成效報告
      - KPI 達成率
      - 改進建議
    dependencies:
      - execution
    next_step: done

# 檢查點
checkpoints:
  - after_step: proposal
    approval_required: true
    approver: william
    criteria:
      - 創意吸引人
      - 預算合理
      - KPI 明確

# 風險與對策
risks:
  - risk: 報名人數不足
    mitigation: 提早宣傳、多管道推廣
    owner: ben

  - risk: 預算超支
    mitigation: 嚴格控管、分階段付款
    owner: ben

  - risk: 技術故障（線上活動）
    mitigation: 提前測試、備援方案
    owner: matthew

# 資源需求
resources:
  - type: 人力
    items:
      - 業務經理 x 1（全職 5 天）
      - 產品經理 x 1（兼職 2 天）
      - 設計師 x 1（兼職 3 天）
      - 技術支援 x 1（兼職 1 天，如需）

  - type: 預算
    estimated: 依活動規模而定

# 成功標準
success_criteria:
  - 參與人數達標（例如 > 100 人）
  - KPI 達成率 > 80%
  - 參加者滿意度 > 4.0/5.0
  - 預算控制在範圍內

# 備註
notes: |
  - 小型活動（< 50 人）可縮短至 2-3 天
  - 大型活動（> 200 人）可能需要 7-14 天
  - 線上活動需要技術支援
