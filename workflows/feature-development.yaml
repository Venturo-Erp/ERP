# 功能開發工作流範本
# 預計時間：3-10 天
# 適用：ERP 新功能開發

name: 功能開發
code: feature-dev
duration_days: 3-10
priority: P1
category: 技術開發

# 工作流步驟
steps:
  - id: requirement-analysis
    name: 需求分析
    description: 收集需求、分析可行性
    assignees:
      - caesar # 產品經理
      - matthew # IT Lead
    duration_days: 1
    outputs:
      - 需求文件（PRD）
      - 技術可行性評估
      - 工作量估算
    next_step: design

  - id: design
    name: 功能設計
    description: UI/UX 設計 + 技術架構設計
    assignees:
      - caesar # 產品經理（功能設計）
      - designer # 設計師（UI/UX）
      - matthew # IT Lead（技術架構）
    duration_days: 2
    outputs:
      - UI 設計稿（Figma）
      - 技術架構文件
      - API 設計文件
      - 資料庫 Schema
    dependencies:
      - requirement-analysis
    next_step: approval

  - id: approval
    name: 設計審批
    description: William 審批設計方案
    assignees:
      - william # 決策者
    duration_days: 0.5
    outputs:
      - 審批意見
      - 開發許可
    dependencies:
      - design
    next_step: development

  - id: development
    name: 功能開發
    description: 前端 + 後端開發
    assignees:
      - frontend_dev # 前端工程師
      - backend_dev # 後端工程師
      - matthew # IT Lead（技術指導）
    duration_days: 3-7
    outputs:
      - 前端代碼
      - 後端代碼
      - API 實作
      - 資料庫 Migration
    dependencies:
      - approval
    next_step: code-review

  - id: code-review
    name: 代碼審查
    description: 技術 Lead 審查代碼品質
    assignees:
      - matthew # IT Lead
    duration_days: 0.5
    outputs:
      - Code Review 意見
      - 重構建議
    dependencies:
      - development
    next_step: testing

  - id: testing
    name: 測試
    description: 功能測試、整合測試
    assignees:
      - tester # 測試工程師
      - caesar # 產品經理（驗收測試）
    duration_days: 1
    outputs:
      - 測試報告
      - Bug 清單
      - 驗收測試結果
    dependencies:
      - code-review
    next_step: bug-fixing

  - id: bug-fixing
    name: Bug 修復
    description: 修復測試發現的問題
    assignees:
      - frontend_dev
      - backend_dev
    duration_days: 1
    outputs:
      - Bug 修復
      - 回歸測試通過
    dependencies:
      - testing
    next_step: deployment

  - id: deployment
    name: 部署上線
    description: 部署到生產環境
    assignees:
      - matthew # IT Lead
    duration_days: 0.5
    outputs:
      - 生產環境部署完成
      - 監控設置
      - Rollback 方案準備
    dependencies:
      - bug-fixing
    next_step: documentation

  - id: documentation
    name: 文檔撰寫
    description: 撰寫使用文檔、技術文檔
    assignees:
      - caesar # 產品經理（使用文檔）
      - matthew # IT Lead（技術文檔）
    duration_days: 0.5
    outputs:
      - 使用手冊
      - API 文檔
      - 部署文檔
    dependencies:
      - deployment
    next_step: done

# 檢查點
checkpoints:
  - after_step: design
    approval_required: true
    approver: william
    criteria:
      - UI 設計符合預期
      - 技術方案可行
      - 工作量合理

  - after_step: testing
    approval_required: true
    approver: caesar
    criteria:
      - 功能符合需求
      - 無重大 Bug
      - 性能可接受

# 風險與對策
risks:
  - risk: 需求變更
    mitigation: 需求凍結、版本控管
    owner: caesar

  - risk: 技術難度超出預期
    mitigation: 提早做 PoC、技術評估
    owner: matthew

  - risk: 時程延誤
    mitigation: 每日 standup、阻礙即時移除
    owner: matthew

  - risk: 上線後故障
    mitigation: 充分測試、Rollback 方案
    owner: matthew

# 資源需求
resources:
  - type: 人力
    items:
      - 前端工程師 x 1（全職 5-10 天）
      - 後端工程師 x 1（全職 5-10 天）
      - IT Lead x 1（兼職 5-10 天）
      - 產品經理 x 1（兼職 3-5 天）
      - 設計師 x 1（兼職 2 天）
      - 測試工程師 x 1（兼職 2 天）

  - type: 工具
    items:
      - Figma（UI 設計）
      - GitHub（版本控管）
      - Supabase（資料庫）
      - Vercel（部署）

# 成功標準
success_criteria:
  - 功能符合需求文件
  - 測試通過率 > 95%
  - 無 P0/P1 等級 Bug
  - 性能符合預期（例如 API 回應 < 500ms）
  - 使用者滿意度 > 4.0/5.0

# 功能複雜度分級
complexity_levels:
  - level: 簡單
    description: UI 調整、小功能新增
    duration_days: 3-5
    example: 增加一個輸入欄位、修改顏色

  - level: 中等
    description: 新增子模組、API 整合
    duration_days: 5-7
    example: 新增報表、第三方 API 串接

  - level: 複雜
    description: 新增主要功能模組
    duration_days: 7-10
    example: 新增權限系統、多 Agent 協作

# 備註
notes: |
  - 時程依功能複雜度調整
  - 簡單功能可縮短至 3 天
  - 複雜功能可能需要 14 天+
  - 建議將大功能拆分為多個小功能
